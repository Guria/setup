name: Deploy GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build public entrypoint from mise.run
        run: |
          mkdir -p public
          if command -v curl >/dev/null 2>&1; then
            curl -fsSL https://mise.run -o public/index.html
          elif command -v wget >/dev/null 2>&1; then
            wget -qO public/index.html https://mise.run
          else
            echo 'curl or wget are required but neither is installed. Aborting.' >&2
            exit 1
          fi

          if head -n 1 public/index.html | grep -q '^#!'; then
            sed -i '1aMISE_INSTALL_HELP=0' public/index.html
          else
            sed -i '1iMISE_INSTALL_HELP=0' public/index.html
          fi

          cat >> public/index.html <<'EOF'
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          "$HOME/.local/bin/mise" x gh -- gh auth login --hostname github.com --git-protocol ssh
          "$HOME/.local/bin/mise" x gh -- gh config set -h github.com git_protocol ssh
          "$HOME/.local/bin/mise" x gh -- gh repo clone guria/dot "$HOME/.local/share/chezmoi"
          "$HOME/.local/bin/mise" x chezmoi -- chezmoi apply --init
          EOF

      - name: Upload public site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
